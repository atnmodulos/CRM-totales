<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM - Gestión de Rechazos (Conectado)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #f8fafc; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .card-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out, opacity 0.3s ease-out, padding 0.3s ease-out;
            opacity: 0;
        }
        
        .card.expanded .card-content {
            max-height: 1200px;
            opacity: 1;
            padding-top: 1rem;
        }
        
        .chevron-icon { transition: transform 0.3s ease; }
        .card.expanded .chevron-icon { transform: rotate(180deg); }
        
        .fade-out {
            opacity: 0;
            transform: scale(0.95);
            transition: all 0.4s ease;
            pointer-events: none;
        }
    </style>
</head>
<body class="text-slate-800 antialiased h-screen flex flex-col">

    <header class="bg-indigo-600 text-white shadow-md z-10 sticky top-0">
        <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <i data-lucide="phone-call" class="w-6 h-6"></i>
                <h1 class="text-xl font-bold tracking-tight">CRM Retiros y Vivienda</h1>
            </div>
            <div class="flex items-center space-x-4 text-sm">
                <span id="counter-badge" class="bg-indigo-800 px-3 py-1 rounded-full font-medium shadow-inner hidden">
                    <span id="pending-count">0</span> pendientes
                </span>
                <button onclick="fetchData()" class="p-2 hover:bg-indigo-500 rounded-full transition-colors" title="Actualizar Datos">
                    <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </header>

    <div class="bg-white border-b border-slate-200 sticky top-[68px] z-10 shadow-sm">
        <div class="max-w-4xl mx-auto px-4 md:px-6 lg:px-8">
            <nav class="-mb-px flex space-x-8" aria-label="Tabs">
                <button onclick="switchTab('Operaciones')" id="tab-Operaciones" class="tab-btn whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm border-indigo-500 text-indigo-600 transition-colors focus:outline-none">
                    <div class="flex items-center space-x-2">
                        <i data-lucide="briefcase" class="w-4 h-4"></i>
                        <span>Operaciones</span>
                    </div>
                </button>
                <button onclick="switchTab('Pensiones')" id="tab-Pensiones" class="tab-btn whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm border-transparent text-slate-500 hover:text-slate-700 hover:border-slate-300 transition-colors focus:outline-none">
                    <div class="flex items-center space-x-2">
                        <i data-lucide="piggy-bank" class="w-4 h-4"></i>
                        <span>Pensiones</span>
                    </div>
                </button>
            </nav>
        </div>
    </div>

    <main class="flex-grow overflow-y-auto p-4 md:p-6 lg:p-8 no-scrollbar">
        <div class="max-w-4xl mx-auto">
            <div id="loader" class="flex flex-col items-center justify-center py-20">
                <i data-lucide="loader-2" class="w-10 h-10 text-indigo-500 animate-spin mb-4"></i>
                <p class="text-slate-500 font-medium">Conectando con Google Sheets...</p>
            </div>

            <div id="error-message" class="hidden bg-red-50 border-l-4 border-red-500 p-4 rounded-md shadow-sm mb-6">
                <div class="flex">
                    <i data-lucide="alert-circle" class="h-5 w-5 text-red-400"></i>
                    <p class="ml-3 text-sm text-red-700 font-medium" id="error-text"></p>
                </div>
            </div>

            <div id="empty-state" class="hidden flex flex-col items-center justify-center py-20 text-center">
                <div class="bg-green-100 p-4 rounded-full mb-4">
                    <i data-lucide="check-circle-2" class="w-12 h-12 text-green-600"></i>
                </div>
                <h3 class="text-lg font-bold text-slate-800 mb-1">¡Todo al día!</h3>
                <p class="text-slate-500 max-w-sm">No hay registros pendientes en esta sección.</p>
            </div>

            <div id="cards-container" class="space-y-4"></div>
        </div>
    </main>

    <div id="success-toast" class="fixed bottom-4 right-4 bg-slate-800 text-white px-4 py-3 rounded-lg shadow-lg transform translate-y-20 opacity-0 transition-all duration-300 flex items-center space-x-3 pointer-events-none z-50">
        <i data-lucide="check" class="text-green-400 w-5 h-5"></i>
        <div>
            <p class="font-medium text-sm" id="toast-title">Procesado</p>
            <p class="text-xs text-slate-300" id="toast-msg">Datos guardados en bitácora.</p>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN ---
        const SCRIPT_URL_REPOSITORIO = "https://script.google.com/macros/s/AKfycbwww2nftVobPGObs3d3G20L1MHHiELZdvAWgreBCsLHbzrnwU7oxvfceKzAUAA0pLOE8g/exec";
        const CSV_URL_OPERACIONES = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRmSJNd-i3Ibje2p05J4XtKdM5nCxNznlzba-jQYE2VXhlkWyI56VYz4hKH3l6i6tmqu2mL-BZgwmxh/pub?gid=1846343735&single=true&output=csv";
        const CSV_URL_PENSIONES = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRmSJNd-i3Ibje2p05J4XtKdM5nCxNznlzba-jQYE2VXhlkWyI56VYz4hKH3l6i6tmqu2mL-BZgwmxh/pub?gid=1353288813&single=true&output=csv";

        let records = [];
        let currentTab = 'Operaciones';

        const container = document.getElementById('cards-container');
        const pendingCount = document.getElementById('pending-count');
        const counterBadge = document.getElementById('counter-badge');
        const toast = document.getElementById('success-toast');

        document.addEventListener("DOMContentLoaded", () => {
            lucide.createIcons();
            fetchData();
        });

        function fetchData() {
            container.innerHTML = '';
            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('empty-state').classList.add('hidden');
            
            Promise.all([
                fetchCsv(CSV_URL_OPERACIONES, 'Operaciones'),
                fetchCsv(CSV_URL_PENSIONES, 'Pensiones')
            ]).then(([ops, pen]) => {
                records = [...ops, ...pen];
                processData();
            });
        }

        function fetchCsv(url, source) {
            return new Promise((resolve) => {
                Papa.parse(url, {
                    download: true,
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => {
                        // Guardamos el índice original para saber qué fila de Sheets actualizar
                        const data = results.data.map((row, index) => {
                            row._source = source;
                            row._originalRowIndex = index; 
                            return row;
                        });
                        resolve(data);
                    }
                });
            });
        }

        function processData() {
            let count = 0;
            container.innerHTML = '';
            document.getElementById('loader').classList.add('hidden');

            records.forEach((row, index) => {
                if (row._source !== currentTab) return;

                // Detectar si el comentario está vacío (según columnas comunes)
                const commentKey = Object.keys(row).find(k => 
                    k.toLowerCase().includes('comentario') || k.toLowerCase().includes('observacion')
                );
                const isCommentEmpty = !row[commentKey] || row[commentKey].trim() === "";

                if (isCommentEmpty) {
                    renderCard(row, index);
                    count++;
                }
            });

            pendingCount.textContent = count;
            counterBadge.classList.toggle('hidden', count === 0);
            document.getElementById('empty-state').classList.toggle('hidden', count > 0);
            lucide.createIcons();
        }

        function renderCard(row, globalIndex) {
            const isPensiones = currentTab === 'Pensiones';
            let titulo = row["Nombre"] || row["Asesor"] || row["Trabajador"] || "Sin Nombre";
            let subtitulo = isPensiones ? "Asesor" : (row["RFC"] || row["NSS"] || "");

            const card = document.createElement('div');
            card.className = 'card bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden';
            card.id = `card-${globalIndex}`;
            
            card.innerHTML = `
                <div class="p-4 cursor-pointer hover:bg-slate-50 flex justify-between items-center" onclick="toggleCard(${globalIndex})">
                    <div class="flex items-start space-x-4">
                        <div class="bg-indigo-100 p-2 rounded-lg text-indigo-600 mt-1">
                            <i data-lucide="user" class="w-5 h-5"></i>
                        </div>
                        <div>
                            <h3 class="font-bold text-slate-800 text-lg leading-tight">${titulo}</h3>
                            <p class="text-slate-500 text-sm">${subtitulo}</p>
                        </div>
                    </div>
                    <div class="text-slate-400 chevron-icon p-2">
                        <i data-lucide="chevron-down" class="w-5 h-5"></i>
                    </div>
                </div>

                <div class="card-content bg-slate-50 border-t border-slate-100 px-4 pb-4">
                    <div class="bg-white p-5 rounded-lg border border-slate-200 shadow-sm mt-2">
                        <h4 class="text-sm font-bold text-indigo-700 mb-4 flex items-center">
                            <i data-lucide="edit-3" class="w-4 h-4 mr-2"></i> Gestión de Registro
                        </h4>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Estatus de Contacto *</label>
                                <select id="status-${globalIndex}" onchange="handleStatusChange(${globalIndex})" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                                    <option value="" disabled selected>Selecciona...</option>
                                    <option value="Contactado">Contactado</option>
                                    <option value="Reagendado">Reagendado</option>
                                    <option value="No contestó">No contestó</option>
                                </select>
                            </div>
                            <div id="date-container-${globalIndex}" class="hidden">
                                <label class="block text-sm font-medium text-slate-700 mb-1">Próxima llamada</label>
                                <input type="datetime-local" id="date-${globalIndex}" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm outline-none">
                            </div>
                        </div>

                        <div class="mb-5">
                            <label class="block text-sm font-medium text-slate-700 mb-1">Comentarios</label>
                            <textarea id="comment-${globalIndex}" rows="2" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm outline-none resize-none"></textarea>
                        </div>

                        <div class="flex justify-end">
                            <button onclick="saveData(${globalIndex})" class="bg-indigo-600 text-white px-6 py-2 rounded-md text-sm font-bold hover:bg-indigo-700 transition-colors flex items-center">
                                <i data-lucide="save" class="w-4 h-4 mr-2"></i> Guardar Inmediato
                            </button>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(card);
        }

        function toggleCard(id) {
            document.getElementById(`card-${id}`).classList.toggle('expanded');
        }

        function handleStatusChange(id) {
            const status = document.getElementById(`status-${id}`).value;
            document.getElementById(`date-container-${id}`).classList.toggle('hidden', status !== 'Reagendado');
        }

        function saveData(globalIndex) {
            const statusVal = document.getElementById(`status-${globalIndex}`).value;
            const dateVal = document.getElementById(`date-${globalIndex}`).value;
            const commentVal = document.getElementById(`comment-${globalIndex}`).value;
            const card = document.getElementById(`card-${globalIndex}`);

            if(!statusVal) {
                alert("Selecciona un estatus");
                return;
            }

            // --- ACTUALIZACIÓN OPTIMISTA (INSTANTÁNEA) ---
            const payload = {
                fuente: currentTab,
                rowId: records[globalIndex]._originalRowIndex, // Fila real en el Excel
                estatus: statusVal,
                proxima: dateVal || "N/A",
                comentario: commentVal || "Sin comentarios"
            };

            // 1. Quitar visualmente de inmediato
            card.classList.add('fade-out');
            setTimeout(() => {
                card.remove();
                actualizarUI();
                showToast("Enviado", `Registro de ${currentTab} guardado.`);
            }, 150);

            // 2. Enviar al repositorio en segundo plano
            fetch(SCRIPT_URL_REPOSITORIO, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            }).catch(e => console.error("Error de envío:", e));
        }

        function actualizarUI() {
            let current = parseInt(pendingCount.textContent);
            if(current > 0) {
                current--;
                pendingCount.textContent = current;
                if(current === 0) {
                    counterBadge.classList.add('hidden');
                    document.getElementById('empty-state').classList.remove('hidden');
                }
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('border-indigo-500', 'text-indigo-600');
                btn.classList.add('border-transparent', 'text-slate-500');
            });
            document.getElementById(`tab-${tab}`).classList.add('border-indigo-500', 'text-indigo-600');
            processData();
        }

        function showToast(title, msg) {
            document.getElementById('toast-title').textContent = title;
            document.getElementById('toast-msg').textContent = msg;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }
    </script>
</body>
</html>
